name: bayan
description: "Bayan - Premium Arabic Content Platform"
publish_to: 'none'
version: 2.0.0+10

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.3
  livekit_client: ^2.3.0
  app_links: ^6.4.0
  cryptography: ^2.7.0
  intl: ^0.20.2
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/Bayan.JPG"
  adaptive_icon_background: "#0A0E1A"
  adaptive_icon_foreground: "assets/Bayan.JPG"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/Bayan.JPG"
    background_color: "#0A0E1A"
    theme_color: "#5CBFAD"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/Bayan.JPG
